name: quickchat
description: "WhatsApp QuickChat - Direct messaging without saving contacts"
publish_to: 'none'
version: 2.0.0+3

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core dependencies
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3

  # UI & Localization
  intl: ^0.20.2
  google_fonts: ^6.3.2
  country_code_picker: ^3.0.0
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^11.0.0

  # Utilities
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  share_handler: ^0.0.25
  share_plus: ^10.1.4
  qr_flutter: ^4.1.0
  flutter_native_splash: ^2.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/

# Native splash screen
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#121212"
  android_12:
    color: "#FFFFFF"
    color_dark: "#121212"
  android: true
  ios: false
  web: false

# App icon configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/icon.png"
  remove_alpha_ios: true

